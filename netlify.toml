[build]
  base = "."
  command = "mkdir -p public && cp -r css js data img *.html public/"
  publish = "public"

[[redirects]]
  from = "/admin"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/admin.html"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/keys.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/server.py"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/server_debug.log"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/update_scholar_data.R"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/package.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/package-lock.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.RData"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.Rhistory"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.Rprofile"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/nepem.Rproj"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.git*"
  to = "/404.html"
  status = 404
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Access-Control-Allow-Origin = "*"