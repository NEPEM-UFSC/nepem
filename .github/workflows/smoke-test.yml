name: Smoke Test Site

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start site server
        run: |
          npm start > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for server
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Server did not become ready"
          cat server.log
          exit 1

      - name: Check main pages
        run: |
          curl -fsS http://127.0.0.1:8000/ >/dev/null
          curl -fsS http://127.0.0.1:8000/index.html >/dev/null
          curl -fsS http://127.0.0.1:8000/data/fallback-data.json >/dev/null

      - name: Show server log on failure
        if: failure()
        run: cat server.log
